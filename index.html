<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب العمرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-lg max-w-md w-full p-6">
            <h1 class="text-2xl font-bold mb-4 text-green-700 text-center">سجل في سحب العمرة</h1>
            
            <form action="https://formspree.io/f/xdaqkkpp" method="POST">
                <div class="mb-3">
                    <label class="block mb-1 font-medium">الاسم</label>
                    <input type="text" name="الاسم" class="w-full px-3 py-2 border rounded" required>
                </div>
                <div class="mb-3">
                    <label class="block mb-1 font-medium">السن</label>
                    <input type="number" name="السن" class="w-full px-3 py-2 border rounded" required>
                </div>
                <div class="mb-3">
                    <label class="block mb-1 font-medium">المهنة</label>
                    <input type="text" name="المهنة" class="w-full px-3 py-2 border rounded" required>
                </div>
                <div class="mb-3">
                    <label class="block mb-1 font-medium">الحالة الاجتماعية</label>
                    <select name="الحالة_الاجتماعية" class="w-full px-3 py-2 border rounded" required>
                        <option value="">اختر</option>
                        <option value="أعزب">أعزب</option>
                        <option value="متزوج">متزوج</option>
                        <option value="مطلق">مطلق</option>
                        <option value="أرمل">أرمل</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="block mb-1 font-medium">محل الإقامة</label>
                    <input type="text" name="محل_الاقامة" class="w-full px-3 py-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label class="block mb-1 font-medium">رقم الهاتف</label>
                    <input type="tel" name="رقم_الهاتف" class="w-full px-3 py-2 border rounded" required>
                </div>
                
                <input type="hidden" name="_subject" value="تسجيل جديد">
                <input type="hidden" name="_next" value="https://egygroup.github.io/omrah/?done=1">
                
                <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded">
                    سجل الآن
                </button>
            </form>
        </div>
    </div>
</body>
</html>
