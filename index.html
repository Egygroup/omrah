<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب العمرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
            <h1 class="text-3xl font-bold mb-6 text-green-700 text-center">سجل في سحب العمرة الآن</h1>
            
            <form action="https://formspree.io/f/xdaqkkpp" method="POST" class="space-y-4">
                <div>
                    <label class="block mb-1">الاسم</label>
                    <input type="text" name="name" class="w-full px-4 py-2 border rounded-lg" required>
                </div>
                <div>
                    <label class="block mb-1">السن</label>
                    <input type="number" name="age" class="w-full px-4 py-2 border rounded-lg" required>
                </div>
                <div>
                    <label class="block mb-1">المهنة</label>
                    <input type="text" name="job" class="w-full px-4 py-2 border rounded-lg" required>
                </div>
                <div>
                    <label class="block mb-1">الحالة الاجتماعية</label>
                    <select name="marital_status" class="w-full px-4 py-2 border rounded-lg" required>
                        <option value="">اختر</option>
                        <option value="أعزب">أعزب</option>
                        <option value="متزوج">متزوج</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-1">محل الإقامة</label>
                    <input type="text" name="address" class="w-full px-4 py-2 border rounded-lg" required>
                </div>
                <div>
                    <label class="block mb-1">رقم الهاتف</label>
                    <input type="tel" name="phone" class="w-full px-4 py-2 border rounded-lg" required>
                </div>
                
                <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg">
                    سجل الآن
                </button>
            </form>
        </div>
    </div>
</body>
</html>
