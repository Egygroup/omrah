<form id="omrahForm" class="space-y-4" action="https://formspree.io/f/xdaqkkpp" method="POST">
    <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">الاسم ثلاثي</label>
        <input type="text" id="name" name="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500" required>
    </div>
    <div>
        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">رقم الموبايل</label>
        <input type="tel" id="phone" name="phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500" required>
    </div>
    
    <!-- مهم عشان يوصلك الإيميل -->
    <input type="hidden" name="_subject" value="تسجيل جديد - سحب العمرة">
    <input type="hidden" name="_captcha" value="false">
    
    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition">
        سجل الآن
    </button>
</form>
